<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TikTakTuk{% endblock %}</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --card: #ffffff;
            --line: #e5e7eb;
            --text: #0f172a;
            --muted: #6b7280;
            --brand: #2563eb;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f8fafc;
            color: var(--text);
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px;
            background: white;
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
        }
        .brand {
            font-weight: 700;
            color: var(--bg);
            text-decoration: none;
            letter-spacing: 0.3px;
        }
        .nav-links {
            display: flex;
            gap: 12px;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--bg);
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 10px;
        }
        .nav-links a.primary {
            background: var(--brand);
            color: white;
        }
        .page {
            min-height: calc(100vh - 70px);
            display: grid;
            place-items: center;
            padding: 32px 16px;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }
        h1 { margin-top: 0; margin-bottom: 10px; }
        .subtitle { margin-top: 0; color: var(--muted); }
        .field { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 10px;
            font-size: 15px;
        }
        button {
            width: 100%;
            border: none;
            border-radius: 10px;
            background: var(--brand);
            color: white;
            font-weight: 700;
            padding: 12px 14px;
            cursor: pointer;
        }
        .errorlist {
            margin: 0 0 12px;
            padding-left: 18px;
            color: #b91c1c;
        }
        .helper {
            margin-top: 14px;
            color: var(--muted);
            text-align: center;
        }
        .helper a { color: var(--brand); text-decoration: none; font-weight: 700; }
        .home-empty {
            width: 100%;
            max-width: 960px;
            min-height: 420px;
            border: 1px dashed #cbd5e1;
            border-radius: 20px;
            background: rgba(255,255,255,0.65);
        }
    </style>
</head>
<body>
    <header class="navbar">
        <a class="brand" href="{% url 'home' %}">TikTakTuk</a>
        <nav class="nav-links">
            <a href="{% url 'login' %}">Login</a>
            <a class="primary" href="{% url 'register' %}">Register</a>
        </nav>
    </header>

    {% block content %}{% endblock %}
</body>
</html>
