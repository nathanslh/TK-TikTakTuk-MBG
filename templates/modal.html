<div id="modal-root">
	<div id="login-modal" class="fixed inset-0 z-[100] hidden" aria-hidden="true">
		<div data-close-login-modal class="absolute inset-0 auth-modal-backdrop"></div>

		<div class="relative min-h-screen flex items-center justify-center p-4">
			<div class="auth-modal-panel w-full max-w-md">
				<div class="auth-modal-header px-5 pt-5 flex items-start justify-between gap-3">
					<div>
						<h2 class="auth-modal-title">Masuk ke akun Anda</h2>
						<p class="auth-muted mt-2">Gunakan kredensial Anda untuk melanjutkan ke dashboard.</p>
					</div>
					<button type="button" data-close-login-modal class="auth-modal-close" aria-label="Tutup modal">
						x
					</button>
				</div>

				<form action="#" method="post" class="auth-modal-body p-5 grid gap-4 auth-modal-form">
					{% csrf_token %}
					<div>
						<label for="modal-username" class="form-label">Username</label>
						<input id="modal-username" name="username" type="text" placeholder="Masukkan username" class="form-input">
					</div>
					<div>
						<label for="modal-password" class="form-label">Password</label>
						<input id="modal-password" name="password" type="password" placeholder="Masukkan password" class="form-input">
					</div>

					<button type="submit" class="btn-primary">
						Masuk
					</button>

					<p class="text-sm text-center text-[#7f6c56]">
						Belum punya akun?
						<a href="{% url 'register' %}" class="auth-link">Daftar sekarang</a>
					</p>
				</form>
			</div>
		</div>
	</div>
</div>

<script>
	(function () {
		const modal = document.getElementById('login-modal');
		if (!modal) {
			return;
		}

		const openers = document.querySelectorAll('[data-open-login-modal]');
		const closers = modal.querySelectorAll('[data-close-login-modal]');

		const openModal = function () {
			modal.classList.remove('hidden');
			modal.setAttribute('aria-hidden', 'false');
			document.body.style.overflow = 'hidden';

			const firstInput = modal.querySelector('#modal-username');
			if (firstInput) {
				firstInput.focus();
			}
		};

		const closeModal = function () {
			modal.classList.add('hidden');
			modal.setAttribute('aria-hidden', 'true');
			document.body.style.overflow = '';
		};

		openers.forEach(function (btn) {
			btn.addEventListener('click', function () {
				openModal();
			});
		});

		closers.forEach(function (btn) {
			btn.addEventListener('click', function () {
				closeModal();
			});
		});

		document.addEventListener('keydown', function (event) {
			if (event.key === 'Escape' && modal.getAttribute('aria-hidden') === 'false') {
				closeModal();
			}
		});
	})();
</script>
