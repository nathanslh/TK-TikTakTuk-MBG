<header class="bg-[#f8edd8] shadow-md border-b border-[#e7d7b8] sticky top-0 z-50">
  <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
    <!-- Logo / Website Name -->
    <div class="flex items-center">
      <a href="{% url 'home' %}" class="text-2xl font-bold text-[#c7a77a] hover:text-[#b89565] transition">
        TikTakTuk
      </a>
    </div>

    <!-- Menu Items -->
    <div class="flex items-center space-x-6">
      {% if user.is_authenticated %}
        <!-- Admin Menu -->
        {% if user.is_staff %}
          <a href="{% url 'home' %}" class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
            Dashboard
          </a>
          <a href="#" class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
            Manajemen Venue
          </a>
          <a href="#" class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
            Manajemen Kursi
          </a>
          <a href="#" class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
            Kategori Tiket
          </a>
          <a href="#" class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
            Manajemen Tiket
          </a>
          <a href="#" class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
            Semua Order
          </a>
          <a href="#" class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
            Tiket (Aset)
          </a>
          <a href="#" class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
            Order (Aset)
          </a>
          <a href="#" class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
            Profile
          </a>
        <!-- Customer Menu -->
        {% else %}
          <a href="{% url 'home' %}" class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
            Dashboard
          </a>
          <a href="#" class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
            Profile
          </a>
        {% endif %}

        <!-- Logout Button -->
        <a href="#" class="bg-[#e9d8b4] text-[#5f4a2e] px-4 py-2 rounded-md hover:bg-[#ddc79f] transition font-medium">
          Logout
        </a>
      {% else %}
        <!-- Guest Menu -->
        <button type="button" data-open-login-modal class="text-gray-700 hover:text-[#8c6a3e] transition font-medium">
          Login
        </button>
        <a href="{% url 'register' %}" class="bg-[#e9d8b4] text-[#5f4a2e] px-4 py-2 rounded-md hover:bg-[#ddc79f] transition font-medium">
          Registrasi
        </a>
      {% endif %}
    </div>
  </nav>
</header>
