{% extends 'base.html' %}

{% block title %}Login - TikTakTuk{% endblock %}

{% block content %}
<main class="page">
    <section class="card">
        <h1>Login</h1>
        <p class="subtitle">Masuk ke akun kamu.</p>

        {% if form.errors %}
            <p class="subtitle" style="color:#b91c1c;">Username atau password salah.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label for="id_username">Username</label>
                {{ form.username }}
            </div>
            <div class="field">
                <label for="id_password">Password</label>
                {{ form.password }}
            </div>
            <button type="submit">Login</button>
        </form>

        <p class="helper">Belum punya akun? <a href="{% url 'register' %}">Register</a></p>
    </section>
</main>
{% endblock %}
