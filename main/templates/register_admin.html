{% extends 'base.html' %}

{% block title %}Registrasi Admin - TikTakTuk{% endblock %}

{% block content %}
<main class="auth-wrap">
  <section class="auth-brand">
    <div class="auth-logo">TT</div>
    <h1 class="auth-title">TikTakTuk</h1>
    <p class="auth-subtitle">Daftar sebagai admin</p>
  </section>

  <section class="auth-card">
    <p><a class="auth-link" href="{% url 'register' %}">← Kembali</a></p>
    <h2 class="auth-section-title section-spacer">Registrasi Admin</h2>
    <p class="auth-muted">Akun admin digunakan untuk kebutuhan pengelolaan internal sistem.</p>

    <form class="form-grid" action="#" method="post">
      {% csrf_token %}
      <div>
        <label class="form-label" for="username">Username</label>
        <input class="form-input" id="username" name="username" type="text" placeholder="Masukkan username admin" required>
      </div>

      <div>
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" name="password" type="password" placeholder="Masukkan password" required>
      </div>

      <label class="inline-check">
        <input id="terms" name="terms" type="checkbox" required>
        <span>Saya setuju dengan <a class="auth-link" href="#">Syarat & Ketentuan</a></span>
      </label>

      <button class="btn-primary" type="submit">Daftar</button>
    </form>
  </section>

  <p class="auth-footer">Sudah punya akun? <button type="button" data-open-login-modal class="auth-link">Login di sini</button></p>
</main>
{% endblock %}
